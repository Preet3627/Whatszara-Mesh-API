# Whatszara Orchestrator Configuration

providers:
  ollama:
    enabled: true
    endpoint: http://localhost:11434
    model: llama3

  claude:
    enabled: false
    api_key: "${ANTHROPIC_API_KEY}"
    model: claude-sonnet-4-20250514

  groq:
    enabled: false
    api_key: "${GROQ_API_KEY}"
    model: llama-3.3-70b-versatile

  grok:
    enabled: false
    api_key: "${XAI_API_KEY}"
    model: grok-3-beta

  gemini:
    enabled: false
    api_key: "${GEMINI_API_KEY}"
    model: gemini-2.5-flash-001

active_provider: ollama

permissions:
  default_risk: high
  require_captcha: true
  require_recaptcha: true
  recaptcha_threshold: 0.5

  contact_overrides: {}

undo:
  max_age_hours: 24
  max_entries: 1000

shell:
  timeout_seconds: 30
  max_output_chars: 10000
  allowed_commands: []
  blocked_commands:
    - sudo
    - rm -rf /
    - dd
    - mkfs
